version: '3.8'
services:
  murimstudio:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - MIDJOURNEY_API_URL=${MIDJOURNEY_API_URL}
      - DB_PATH=/app/app.db
      - STORAGE_SECRET=${STORAGE_SECRET}
    command: python main.py
